# Databricks Asset Bundle configuration
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html
#
# Usage:
#   1. Install Databricks CLI v0.200+
#   2. Configure auth: databricks configure --token
#   3. Deploy:  databricks bundle deploy
#   4. Run:    databricks bundle run example_pipeline
#              databricks bundle run spark_exercises

bundle:
  name: spark_databricks_project

workspace:
  host: ${DATABRICKS_HOST}
  root_path: /Workspace/Users/${workspace.current_user.userName}/spark_databricks_project

sync:
  include:
    - "src/**"
    - "notebooks/**"
    - "exercises/**"

variables:
  cluster_spark_version:
    default: "14.3.x-scala2.12"
  cluster_node_type:
    default: "i3.xlarge"

resources:
  jobs:
    example_pipeline:
      name: "Example Spark Pipeline"
      tasks:
        - task_key: run_pipeline
          spark_python_task:
            python_file: notebooks/example_pipeline.py
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            num_workers: 1

    spark_exercises:
      name: "Spark Workshop Exercises"
      max_concurrent_runs: 1
      tasks:
        - task_key: ex_01_split_variable_delimiter
          spark_python_task:
            python_file: exercises/01_split_variable_delimiter.py
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"

